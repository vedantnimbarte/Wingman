name: release

# Build prebuilt `wingman` binaries for every supported platform and attach
# them to the GitHub Release whenever a `v*` tag is pushed. The install
# script (`scripts/install.sh`) downloads these assets, so users never have
# to clone or run cargo themselves.
#
#   git tag v0.0.1 && git push origin v0.0.1
#
# produces assets named  wingman-<target>.tar.gz  (and .zip on Windows).
#
# Linux targets are gnu, not musl: wingman embeds ONNX Runtime (via
# fastembed/ort) for semantic search, and ort only ships prebuilt binaries
# for glibc — there is no musl build. gnu binaries run on all mainstream
# distros. `install.sh` downloads the matching `unknown-linux-gnu` asset.

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write # required to create the release and upload assets

jobs:
  # Create the GitHub Release once, up front. Without this the matrix jobs
  # race to create it and end up retrying "release not found" forever (which
  # is what stalled earlier release runs for hours).
  create-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: taiki-e/create-gh-release-action@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  upload-assets:
    needs: create-release
    name: ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60 # never let a stuck job hang the run for hours
    strategy:
      fail-fast: false
      matrix:
        include:
          # ubuntu-22.04 (glibc 2.35) for broad compatibility on the native
          # x86_64 build; the aarch64 build cross-compiles in an older
          # container via `cross`, so its glibc floor is lower still.
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-22.04
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-22.04
          - target: x86_64-apple-darwin
            os: macos-13
          - target: aarch64-apple-darwin
            os: macos-14
          - target: x86_64-pc-windows-msvc
            os: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      # taiki-e's action builds the binary (using `cross` for the aarch64
      # cross-compile target), archives it, generates a SHA256 checksum, and
      # uploads everything to the release for this tag. `archive` fixes the
      # asset name so install.sh can predict the download URL.
      - name: Build and upload
        uses: taiki-e/upload-rust-binary-action@v1
        with:
          bin: wingman
          target: ${{ matrix.target }}
          archive: wingman-$target
          checksum: sha256
          token: ${{ secrets.GITHUB_TOKEN }}
