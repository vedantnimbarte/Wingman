name: release

# Build prebuilt `wingman` binaries for every supported platform and attach
# them to the GitHub Release whenever a `v*` tag is pushed. The install
# script (`scripts/install.sh`) downloads these assets, so users never have
# to clone or run cargo themselves.
#
#   git tag v0.0.1 && git push origin v0.0.1
#
# produces assets named  wingman-<target>.tar.gz  (and .zip on Windows).
#
# Linux targets are gnu, not musl: wingman embeds ONNX Runtime (via
# fastembed/ort) for semantic search, and ort only ships prebuilt binaries
# for glibc — there is no musl build. gnu binaries run on all mainstream
# distros. `install.sh` downloads the matching `unknown-linux-gnu` asset.

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write # required to create the release and upload assets

jobs:
  # Create the GitHub Release once, up front. Without this the matrix jobs
  # race to create it and end up retrying "release not found" forever (which
  # is what stalled earlier release runs for hours).
  create-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: taiki-e/create-gh-release-action@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  upload-assets:
    needs: create-release
    name: ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60 # never let a stuck job hang the run for hours
    strategy:
      fail-fast: false
      matrix:
        include:
          # Build both Linux targets NATIVELY (no `cross`) on new-glibc
          # runners. ort's prebuilt ONNX Runtime is compiled against glibc
          # >= 2.38 (it references __isoc23_* symbols), so an older runner
          # can't link it and `cross`'s container can't fetch the aarch64
          # binary at all. ubuntu-24.04 (x64) and ubuntu-24.04-arm (aarch64,
          # free on public repos) both ship glibc 2.39. Consequence: the
          # Linux binaries require glibc >= 2.38 — documented in the README.
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-24.04
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-24.04-arm
          # No x86_64-apple-darwin: GitHub is winding down Intel `macos-13`
          # runners, so those jobs starve in the queue (the "24h hang").
          # Apple Silicon covers the current Mac fleet; Intel-Mac users
          # `cargo install` from source (install.sh tells them so).
          - target: aarch64-apple-darwin
            os: macos-14
          - target: x86_64-pc-windows-msvc
            os: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      # taiki-e's action builds the binary natively for the runner's target,
      # archives it, generates a SHA256 checksum, and uploads everything to
      # the release for this tag. `archive` fixes the asset name so
      # install.sh can predict the download URL.
      - name: Build and upload
        uses: taiki-e/upload-rust-binary-action@v1
        with:
          bin: wingman
          target: ${{ matrix.target }}
          archive: wingman-$target
          checksum: sha256
          token: ${{ secrets.GITHUB_TOKEN }}
