# cargo-deny policy. See https://embarkstudios.github.io/cargo-deny/
# The `deny` CI job is informational today; tighten `[bans]`/`[advisories]` to
# `deny` once the tree is clean (notably: unify reqwest, drop the ort RC).

[graph]
all-features = true

[advisories]
version = 2
# Advisories we knowingly tolerate for now. Add entries with a comment naming
# the crate, the reason, and the tracking issue. Keep this list short.
ignore = []

[licenses]
version = 2
# Permissive licenses acceptable for a redistributable Apache-2.0 binary.
allow = [
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "MIT",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "MPL-2.0",
    "CC0-1.0",
    "Unlicense",
    "BSL-1.0",
    "OpenSSL",
]
confidence-threshold = 0.9

[bans]
# We currently ship two reqwest majors (0.12 + 0.13) and two hyper/http stacks.
# Warn (don't fail) until A5 unifies them, then flip to "deny".
multiple-versions = "warn"
wildcards = "warn"

[sources]
unknown-registry = "deny"
unknown-git = "warn"
